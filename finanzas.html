<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Financiero - BEAX</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="logo-container">
    <img src="assets/logo.png" class="logo">
    <h1>BEAX - Finanzas</h1>
  </div>
</header>

<main style="padding:20px; text-align:left; max-width:800px; margin:auto;">

  <h2>📊 Movimientos</h2>

  <div id="finanzas-lista"></div>

</main>

<script>
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

const contenedor = document.getElementById("finanzas-lista");

if (ventas.length === 0) {
  contenedor.innerHTML = "<p>No hay ventas aún</p>";
} else {
  ventas.forEach(v => {
    const div = document.createElement("div");

    div.innerHTML = `
      <p><b>Juego:</b> ${v.juego}</p>
      <p><b>Precio:</b> $${v.precio} MXN</p>
      <p><b>Usuario:</b> ${v.usuario}</p>
      <hr>
    `;

    contenedor.appendChild(div);
  });
}
</script>

</body>
</html>
